# Puerto en el que correrá la app (como requerido por Swagger)
server.port=8080

# Configuracion de base de datos H2 en memoria
spring.datasource.url=jdbc:h2:mem:productsdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Inicializacion automatica de tablas por Hibernate
spring.jpa.hibernate.ddl-auto=update

# Habilitar la consola de H2 Web
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuracion para Swagger UI (Springdoc)
springdoc.swagger-ui.path=/swagger-ui.html
